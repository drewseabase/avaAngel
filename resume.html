    <script>
        const links = document.querySelectorAll('.sidebar-nav a');
        links.forEach(link => {
            if (link.getAttribute('href') === location.pathname.split('/').pop() ||
               (location.pathname.endsWith('/') && link.getAttribute('href') === 'index.html')) {
                link.classList.add('active');
            }
        });
